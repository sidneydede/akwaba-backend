name: Keep Render awake
on:
   workflow_dispatch:
   schedule:
     - cron: "*/10 * * * *"
jobs:
 ping:
      runs-on: ubuntu-latest
      timeout-minutes: 5
      steps:
        - name: Wake backend
          run: |
            curl -sS --max-time 180 --retry 3 --retry-delay 20 --retry-all-errors \
              https://akwaba-backend.onrender.com/events > /dev/null
            echo "Backend pinged at $(date -u)"
