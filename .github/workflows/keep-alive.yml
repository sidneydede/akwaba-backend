  name: Keep Render awake

  on:
    schedule:
      - cron: '*/10 * * * *'
    workflow_dispatch:

  jobs:
    ping:
      runs-on: ubuntu-latest
      timeout-minutes: 3
      steps:
        - name: Ping events endpoint
          run: curl -fsS --max-time 90 https://akwaba-backend.onrender.com/events > /dev/null
