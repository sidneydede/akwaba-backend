# DB Postgres : migrée de Render Postgres → Neon (2026-06-07). DATABASE_URL est
# désormais set manuellement dans le dashboard Render (Environment), pas via
# fromDatabase. L'ancien bloc `databases:` + le fromDatabase de DATABASE_URL
# ont été retirés pour éviter que le blueprint sync re-tente de provisionner
# un Postgres Render fantôme à chaque deploy.

services:
  - type: web
    name: akwaba-backend
    runtime: node
    plan: free
    branch: master
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # DATABASE_URL : valeur Neon, set manuellement dans Render dashboard
      # (sync: false = jamais en repo). Cf. .env local pour le format.
      - key: DATABASE_URL
        sync: false
      - key: TOKEN_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Secrets renseignés dans le dashboard Render (sync: false = jamais en repo).
      # OTP SMS — REQUIS pour login/register. Multi-provider (cf. services/sms.js).
      # Sélection du provider actif (vide = auto-détection : premier configuré).
      #   - 'termii'         → utilise TERMII_* (paiement MoMo CI direct, recommandé)
      #   - 'africastalking' → utilise AT_*    (legacy, paiement carte/PayPal)
      - key: SMS_PROVIDER
        sync: false
      # Termii — provider préféré depuis 2026-06-09 (paiement MoMo CI direct)
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        sync: false
      # Africa's Talking — provider legacy, conservé pour fallback
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_SENDER_ID
        sync: false
      # Paiements Paystack — REQUIS pour la billetterie (migration 2026-06-07)
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      # CinetPay legacy — dead code en cours de suppression. Vars conservées
      # pour ne pas casser le boot tant que services/cinetpay.js est référencé.
      - key: CINETPAY_API_KEY
        sync: false
      - key: CINETPAY_SITE_ID
        sync: false
      - key: CINETPAY_SECRET_KEY
        sync: false
      # Upload images (Cloudinary) — REQUIS pour events/avatars/bannières
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Optionnels — l'app dégrade gracieusement si absents
      - key: QR_HMAC_SECRET   # fallback sur TOKEN_SECRET si non défini
        sync: false
      - key: SENTRY_DSN       # crash reporting
        sync: false
      - key: RESEND_API_KEY   # email du digest admin
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: FRONT_RETURN_URL # URL de retour après paiement (callback Paystack)
        sync: false
