databases:
  - name: akwaba-db
    plan: free
    databaseName: akwaba_db
    user: akwaba_user

services:
  - type: web
    name: akwaba-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run setup
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: akwaba-db
          property: connectionString
      - key: TOKEN_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
